<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML学習ツール</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #e0e7ff;
      --success: #22c55e;
      --success-light: #dcfce7;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --code-bg: #1e293b;
      --code-text: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
      color: white;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header p { font-size: 0.85rem; opacity: .85; margin-top: 2px; }

    /* Progress bar */
    .progress-wrap {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      opacity: .9;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,.3);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 99px;
      transition: width .4s ease;
      width: 0%;
    }

    /* ===== TAB NAV ===== */
    .tab-nav {
      display: flex;
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all .2s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ===== CONTENT ===== */
    .tab-content { display: none; padding: 24px 16px; max-width: 900px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* ===== CARDS ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    /* ===== LESSON TAB ===== */
    .lesson-sidebar-wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      align-items: start;
    }
    .lesson-list {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      position: sticky;
      top: 80px;
    }
    .lesson-list-title {
      background: var(--primary-light);
      color: var(--primary-dark);
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .lesson-item {
      padding: 11px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .15s;
      color: var(--text-muted);
    }
    .lesson-item:last-child { border-bottom: none; }
    .lesson-item:hover { background: var(--bg); }
    .lesson-item.active { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
    .lesson-item.done .lesson-num { background: var(--success); color: white; }
    .lesson-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Lesson content */
    .lesson-panel { display: none; }
    .lesson-panel.active { display: block; }

    .lesson-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .lesson-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .lesson-title { font-size: 1.3rem; font-weight: 800; }
    .lesson-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }

    .lesson-section { margin-bottom: 20px; }
    .lesson-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .lesson-section p { font-size: 0.95rem; line-height: 1.7; color: var(--text); }

    /* Code block */
    .code-block {
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: 10px;
      padding: 16px 18px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.88rem;
      line-height: 1.65;
      overflow-x: auto;
      white-space: pre;
      margin: 10px 0;
      position: relative;
    }
    .code-tag { color: #93c5fd; }
    .code-attr { color: #fca5a5; }
    .code-val { color: #86efac; }
    .code-comment { color: #94a3b8; font-style: italic; }
    .code-text { color: #fef08a; }

    /* Practice */
    .practice-box {
      background: #fafafa;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .practice-box p { font-size: 0.9rem; margin-bottom: 10px; }
    .practice-input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    .practice-input:focus { border-color: var(--primary); }
    .practice-feedback {
      margin-top: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      min-height: 20px;
    }
    .feedback-ok { color: var(--success); }
    .feedback-ng { color: var(--danger); }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { opacity: .9; transform: translateY(-1px); }
    .btn-ghost { background: var(--border); color: var(--text); }
    .btn-ghost:hover { background: #cbd5e1; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

    .lesson-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ===== EDITOR TAB ===== */
    .editor-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }
    .editor-toolbar span { font-size: 0.8rem; color: var(--text-muted); margin-right: 4px; }
    .editor-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      height: 500px;
    }
    .editor-pane {
      display: flex;
      flex-direction: column;
    }
    .pane-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pane-label::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .editor-pane:first-child .pane-label::before { background: #f97316; }
    .editor-pane:last-child .pane-label::before { background: var(--success); }

    #codeEditor {
      flex: 1;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      border: 2px solid var(--border);
      border-radius: 10px;
      resize: none;
      outline: none;
      background: var(--code-bg);
      color: var(--code-text);
      tab-size: 2;
      transition: border-color .2s;
    }
    #codeEditor:focus { border-color: var(--primary); }
    #previewFrame {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
    }

    /* ===== QUIZ TAB ===== */
    .quiz-start { text-align: center; padding: 40px 20px; }
    .quiz-start .big-icon { font-size: 4rem; margin-bottom: 16px; }
    .quiz-start h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .quiz-start p { color: var(--text-muted); margin-bottom: 24px; }

    .quiz-question-wrap { display: none; }
    .quiz-result-wrap { display: none; text-align: center; padding: 40px 20px; }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .quiz-progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width .3s ease;
    }
    .quiz-q {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-opt {
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
      font-size: 0.95rem;
      text-align: left;
      font-family: inherit;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .quiz-opt:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); }
    .quiz-opt.correct { border-color: var(--success); background: var(--success-light); color: #15803d; }
    .quiz-opt.wrong { border-color: var(--danger); background: var(--danger-light); color: #b91c1c; }
    .quiz-opt:disabled { cursor: default; }
    .opt-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .quiz-feedback {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.ok { background: var(--success-light); color: #15803d; }
    .quiz-feedback.ng { background: var(--danger-light); color: #b91c1c; }
    .quiz-next-btn { margin-top: 16px; width: 100%; padding: 14px; }

    .result-score {
      font-size: 4rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }
    .result-label { font-size: 1rem; color: var(--text-muted); margin: 8px 0 4px; }
    .result-msg { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }
    .result-stars { font-size: 2rem; margin: 10px 0; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .lesson-sidebar-wrap { grid-template-columns: 1fr; }
      .lesson-list { position: static; }
      .editor-wrap { grid-template-columns: 1fr; height: auto; }
      .editor-pane { height: 280px; }
      header h1 { font-size: 1.2rem; }
    }

    /* Tag highlight in text */
    code {
      background: var(--primary-light);
      color: var(--primary-dark);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.88em;
      font-weight: 600;
    }

    .tip-box {
      background: #fffbeb;
      border-left: 4px solid var(--warning);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
      line-height: 1.6;
      margin: 10px 0;
    }
    .tip-box strong { color: #92400e; }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <h1>🌐 HTML学習ツール</h1>
  <p>初心者でも安心！ステップごとに楽しくHTMLを学ぼう</p>
  <div class="progress-wrap">
    <span>学習進捗</span>
    <div class="progress-bar"><div class="progress-fill" id="globalProgress"></div></div>
    <span id="progressLabel">0 / 8 レッスン</span>
  </div>
</header>

<!-- ===== TAB NAV ===== -->
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('lesson')">📚 レッスン</button>
  <button class="tab-btn" onclick="switchTab('editor')">✏️ エディタ</button>
  <button class="tab-btn" onclick="switchTab('quiz')">🎯 クイズ</button>
</nav>

<!-- ===== LESSON TAB ===== -->
<div id="tab-lesson" class="tab-content active">
  <div class="lesson-sidebar-wrap">
    <!-- Sidebar -->
    <div class="lesson-list" id="lessonList">
      <div class="lesson-list-title">レッスン一覧</div>
      <!-- Generated by JS -->
    </div>
    <!-- Main panel -->
    <div id="lessonMain"></div>
  </div>
</div>

<!-- ===== EDITOR TAB ===== -->
<div id="tab-editor" class="tab-content">
  <div class="card" style="margin-bottom:16px;">
    <h2 style="font-size:1.1rem;margin-bottom:6px;">✏️ ライブHTMLエディタ</h2>
    <p style="font-size:0.85rem;color:var(--text-muted);">左側にHTMLコードを入力すると、右側にリアルタイムでプレビューが表示されます。</p>
  </div>
  <div class="editor-toolbar">
    <span>テンプレート：</span>
    <button class="btn btn-ghost btn-sm" onclick="loadTemplate('blank')">空白</button>
    <button class="btn btn-ghost btn-sm" onclick="loadTemplate('basic')">基本構造</button>
    <button class="btn btn-ghost btn-sm" onclick="loadTemplate('card')">カード</button>
    <button class="btn btn-ghost btn-sm" onclick="loadTemplate('form')">フォーム</button>
    <button class="btn btn-ghost btn-sm" onclick="loadTemplate('list')">リスト</button>
    <div style="margin-left:auto;">
      <button class="btn btn-ghost btn-sm" onclick="clearEditor()">🗑 クリア</button>
    </div>
  </div>
  <div class="editor-wrap">
    <div class="editor-pane">
      <div class="pane-label">HTMLコード</div>
      <textarea id="codeEditor" placeholder="ここにHTMLを入力してください..." spellcheck="false"></textarea>
    </div>
    <div class="editor-pane">
      <div class="pane-label">プレビュー</div>
      <iframe id="previewFrame" sandbox="allow-scripts"></iframe>
    </div>
  </div>
</div>

<!-- ===== QUIZ TAB ===== -->
<div id="tab-quiz" class="tab-content">
  <!-- Start screen -->
  <div id="quizStart" class="quiz-start">
    <div class="big-icon">🎯</div>
    <h2>HTMLクイズに挑戦！</h2>
    <p>10問の4択クイズでHTMLの知識を確認しよう。<br>各問題に正解すると1点もらえます。</p>
    <button class="btn btn-primary" onclick="startQuiz()" style="font-size:1rem;padding:14px 32px;">
      クイズをはじめる →
    </button>
  </div>
  <!-- Question screen -->
  <div id="quizQuestion" class="quiz-question-wrap">
    <div class="quiz-meta">
      <span id="quizQNum">問題 1 / 10</span>
      <span id="quizScore">スコア: 0</span>
    </div>
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" id="quizProgressFill"></div>
    </div>
    <div class="card">
      <div class="quiz-q" id="quizQText"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="btn btn-primary quiz-next-btn" id="quizNextBtn" onclick="nextQuizQuestion()" style="display:none;">
        次の問題へ →
      </button>
    </div>
  </div>
  <!-- Result screen -->
  <div id="quizResult" class="quiz-result-wrap">
    <div class="result-score" id="resultScore"></div>
    <div class="result-label">/ 10 点</div>
    <div class="result-stars" id="resultStars"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn btn-primary" onclick="startQuiz()" style="margin-right:8px;">もう一度挑戦</button>
    <button class="btn btn-ghost" onclick="switchTab('lesson')">レッスンに戻る</button>
  </div>
</div>

<script>
// ===== LESSON DATA =====
const lessons = [
  {
    icon: '🌐',
    title: 'HTMLとは？',
    subtitle: 'Webページの仕組みを知ろう',
    explanation: `HTMLとは <strong>HyperText Markup Language</strong>（ハイパーテキスト・マークアップ・ランゲージ）の略です。<br><br>
HTMLはWebページを作るための<strong>骨格</strong>となる言語です。ブラウザ（ChromeやSafariなど）はHTMLファイルを読み込んで、みなさんが見ているWebページを表示しています。<br><br>
HTMLは<strong>タグ</strong>と呼ばれる特殊な記号を使って、文章の構造を表します。タグは <code>&lt;タグ名&gt;</code> のように書きます。`,
    codeLabel: 'HTMLの基本的なタグの例',
    code: `&lt;<span class="code-tag">h1</span>&gt;<span class="code-text">こんにちは！</span>&lt;/<span class="code-tag">h1</span>&gt;
&lt;<span class="code-tag">p</span>&gt;<span class="code-text">これは段落です。</span>&lt;/<span class="code-tag">p</span>&gt;`,
    tip: '<strong>💡 ポイント：</strong>タグは必ず「開始タグ」と「終了タグ」のペアで使います。終了タグは <code>&lt;/タグ名&gt;</code> のようにスラッシュ（/）をつけます。',
    practice: {
      question: '「HTML」の略語を英語で入力してください（大文字）',
      answers: ['HyperText Markup Language', 'hypertext markup language'],
      placeholder: 'HyperText ...'
    }
  },
  {
    icon: '🏗️',
    title: 'HTMLの基本構造',
    subtitle: 'すべてのページに必要な骨格',
    explanation: `HTMLファイルには、必ず決まった<strong>基本構造</strong>があります。この構造を知ることで、正しいHTMLファイルが作れるようになります。<br><br>
主な要素は次の4つです：<br>
• <code>&lt;!DOCTYPE html&gt;</code>：このファイルがHTMLであることを宣言します<br>
• <code>&lt;html&gt;</code>：HTMLの全体を囲むタグです<br>
• <code>&lt;head&gt;</code>：ページのタイトルや設定を書く場所です（画面に表示されません）<br>
• <code>&lt;body&gt;</code>：実際にブラウザに表示される内容を書く場所です`,
    codeLabel: 'HTMLの基本構造',
    code: `&lt;!DOCTYPE html&gt;
&lt;<span class="code-tag">html</span> <span class="code-attr">lang</span>=<span class="code-val">"ja"</span>&gt;
  &lt;<span class="code-tag">head</span>&gt;
    &lt;<span class="code-tag">meta</span> <span class="code-attr">charset</span>=<span class="code-val">"UTF-8"</span>&gt;
    &lt;<span class="code-tag">title</span>&gt;<span class="code-text">ページのタイトル</span>&lt;/<span class="code-tag">title</span>&gt;
  &lt;/<span class="code-tag">head</span>&gt;
  &lt;<span class="code-tag">body</span>&gt;
    <span class="code-comment">&lt;!-- ここに内容を書く --&gt;</span>
    &lt;<span class="code-tag">h1</span>&gt;<span class="code-text">はじめてのWebページ</span>&lt;/<span class="code-tag">h1</span>&gt;
  &lt;/<span class="code-tag">body</span>&gt;
&lt;/<span class="code-tag">html</span>&gt;`,
    tip: '<strong>💡 ポイント：</strong>ブラウザに表示したい内容は必ず <code>&lt;body&gt;</code>の中に書きましょう。<code>&lt;head&gt;</code>の中に書いた内容は表示されません。',
    practice: {
      question: 'ブラウザに表示される内容を書く場所はどのタグの中ですか？',
      answers: ['body', '<body>', '&lt;body&gt;'],
      placeholder: 'タグ名を入力...'
    }
  },
  {
    icon: '📝',
    title: '見出しと段落',
    subtitle: 'テキストを整理して表示しよう',
    explanation: `HTMLでテキストを表示するときに最もよく使うのが<strong>見出し</strong>と<strong>段落</strong>のタグです。<br><br>

// ===== TAB SWITCHING =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    if (['lesson','editor','quiz'][i] === name) btn.classList.add('active');
  });
}

// ===== LESSON INIT =====
function initLessons() {
  const list = document.getElementById('lessonList');
  const main = document.getElementById('lessonMain');

  // Sidebar items
  lessons.forEach((lesson, i) => {
    const item = document.createElement('div');
    item.className = 'lesson-item' + (i === 0 ? ' active' : '');
    item.id = 'lesson-item-' + i;
    item.onclick = () => showLesson(i);
    item.innerHTML = `<div class="lesson-num">${i + 1}</div><span>${lesson.title}</span>`;
    list.appendChild(item);
  });

  // Lesson panels
  lessons.forEach((lesson, i) => {
    const panel = document.createElement('div');
    panel.className = 'lesson-panel' + (i === 0 ? ' active' : '');
    panel.id = 'lesson-panel-' + i;
    panel.innerHTML = `
      <div class="lesson-header">
        <div class="lesson-icon">${lesson.icon}</div>
        <div>
          <div class="lesson-title">レッスン ${i + 1}：${lesson.title}</div>
          <div class="lesson-subtitle">${lesson.subtitle}</div>
        </div>
      </div>

      <div class="card">
        <div class="lesson-section">
          <h3>📖 解説</h3>
          <p>${lesson.explanation}</p>
        </div>

        <div class="lesson-section">
          <h3>💻 ${lesson.codeLabel}</h3>
          <div class="code-block">${lesson.code}</div>
        </div>

        <div class="tip-box">${lesson.tip}</div>
      </div>

      <div class="card">
        <div class="lesson-section">
          <h3>✍️ 練習問題</h3>
          <div class="practice-box">
            <p>${lesson.practice.question}</p>
            <input type="text"
              class="practice-input"
              placeholder="${lesson.practice.placeholder}"
              id="practice-input-${i}"
              oninput="checkPractice(${i})"
            >
            <div class="practice-feedback" id="practice-feedback-${i}"></div>
          </div>
        </div>
      </div>

      <div class="lesson-nav">
        ${i > 0 ? `<button class="btn btn-ghost" onclick="showLesson(${i - 1})">← 前のレッスン</button>` : '<div></div>'}
        ${i < lessons.length - 1
          ? `<button class="btn btn-primary" onclick="showLesson(${i + 1})">次のレッスン →</button>`
          : `<button class="btn btn-success" onclick="switchTab('quiz')">🎯 クイズに挑戦！</button>`
        }
      </div>
    `;
    main.appendChild(panel);
  });
}

function showLesson(index) {
  document.querySelectorAll('.lesson-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.lesson-item').forEach(p => p.classList.remove('active'));
  document.getElementById('lesson-panel-' + index).classList.add('active');
  document.getElementById('lesson-item-' + index).classList.add('active');
  currentLesson = index;
}

function checkPractice(index) {
  const input = document.getElementById('practice-input-' + index);
  const feedback = document.getElementById('practice-feedback-' + index);
  const val = input.value.trim().toLowerCase();
  const answers = lessons[index].practice.answers.map(a => a.toLowerCase());

  if (answers.some(a => val === a || val === a.replace(/<\/?[^>]+>/g, ''))) {
    feedback.textContent = '✅ 正解！すばらしい！';
    feedback.className = 'practice-feedback feedback-ok';
    if (!completedLessons.has(index)) {
      completedLessons.add(index);
      document.getElementById('lesson-item-' + index).classList.add('done');
      updateProgress();
    }
  } else if (val.length > 0) {
    feedback.textContent = '❌ もう一度考えてみよう。';
    feedback.className = 'practice-feedback feedback-ng';
  } else {
    feedback.textContent = '';
    feedback.className = 'practice-feedback';
  }
}

function updateProgress() {
  const pct = (completedLessons.size / lessons.length) * 100;
  document.getElementById('globalProgress').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completedLessons.size} / ${lessons.length} レッスン`;
}

function loadTemplate(name) {
  document.getElementById('codeEditor').value = templates[name];
  updatePreview();
}

function clearEditor() {
  document.getElementById('codeEditor').value = '';
  updatePreview();
}

function updatePreview() {
  const code = document.getElementById('codeEditor').value;
  const frame = document.getElementById('previewFrame');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(code);
  doc.close();
}

document.getElementById('codeEditor').addEventListener('input', updatePreview);

// ===== QUIZ =====
function startQuiz() {
  // Shuffle and pick 10
  quizQuestions = [...quizData].sort(() => Math.random() - .5).slice(0, 10);
  quizIndex = 0;
  quizScore = 0;

  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizQuestion').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = quizQuestions[quizIndex];
  quizAnswered = false;

  document.getElementById('quizQNum').textContent = `問題 ${quizIndex + 1} / 10`;
  document.getElementById('quizScore').textContent = `スコア: ${quizScore}`;
  document.getElementById('quizProgressFill').style.width = `${(quizIndex / 10) * 100}%`;
  document.getElementById('quizQText').textContent = q.q;
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('quizNextBtn').style.display = 'none';

  const labels = ['A', 'B', 'C', 'D'];
  // Shuffle options with original index tracking
  const optionsWithIdx = q.options.map((opt, i) => ({ opt, orig: i }));
  optionsWithIdx.sort(() => Math.random() - .5);

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  optionsWithIdx.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.innerHTML = `<span class="opt-badge">${labels[i]}</span>${item.opt}`;
    btn.onclick = () => selectAnswer(item.orig === q.correct, btn, container, q.explanation);
    container.appendChild(btn);
  });
}

function selectAnswer(isCorrect, clickedBtn, container, explanation) {
  if (quizAnswered) return;
  quizAnswered = true;

  // Disable all buttons
  container.querySelectorAll('.quiz-opt').forEach(btn => btn.disabled = true);

  if (isCorrect) {
    clickedBtn.classList.add('correct');
    quizScore++;
  } else {
    clickedBtn.classList.add('wrong');
    // Highlight correct - but we already shuffled, so mark the correct one among all
    // We need to find correct: iterate to find the button with correct original index
  }

  const feedback = document.getElementById('quizFeedback');
  feedback.className = 'quiz-feedback show ' + (isCorrect ? 'ok' : 'ng');
  feedback.textContent = (isCorrect ? '✅ 正解！ ' : '❌ 不正解… ') + explanation;

  document.getElementById('quizScore').textContent = `スコア: ${quizScore}`;
  document.getElementById('quizNextBtn').style.display = 'block';
  document.getElementById('quizNextBtn').textContent =
    quizIndex < 9 ? '次の問題へ →' : '結果を見る →';
}

function nextQuizQuestion() {
  quizIndex++;
  if (quizIndex >= 10) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('quizQuestion').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';

  document.getElementById('resultScore').textContent = quizScore;
  const stars = quizScore >= 9 ? '⭐⭐⭐' : quizScore >= 7 ? '⭐⭐' : '⭐';
  const msgs = {
    high: ['すばらしい！完璧です！🎉', 'HTMLマスターに近づいています！', '大変よくできました！'],
    mid: ['よくできました！もう少しで完璧！', '惜しい！復習してもう一度挑戦しよう', 'いい感じです！'],
    low: ['もう一度レッスンを復習しよう！', '大丈夫！練習あるのみ！', 'コツコツ頑張ろう！']
  };
  const msgGroup = quizScore >= 9 ? msgs.high : quizScore >= 6 ? msgs.mid : msgs.low;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultMsg').textContent = msgGroup[Math.floor(Math.random() * msgGroup.length)];
}
